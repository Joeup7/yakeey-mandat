<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulaire Mandat - Sélection</title>
    <style>
        /* هوية بصرية عصرية */
        :root {
            --primary-color: #1e40af; /* أزرق ملكي */
            --accent-color: #3b82f6;
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            --text-main: #0f172a;
            --success: #10b981;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            width: 100%;
            max-width: 500px;
        }

        h2 {
            color: var(--primary-color);
            font-size: 1.6rem;
            text-align: center;
            margin-bottom: 30px;
            font-weight: 700;
            letter-spacing: -0.025em;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: #475569;
        }

        input[type="text"], input[type="tel"] {
            width: 100%;
            padding: 14px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--accent-color);
            outline: none;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .options-label {
            font-weight: 700;
            margin: 25px 0 15px;
            color: var(--text-main);
            font-size: 1rem;
        }

        .option-card {
            border: 2px solid #f1f5f9;
            border-radius: 15px;
            padding: 18px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            background: #f8fafc;
        }

        .option-card:hover {
            border-color: var(--accent-color);
            background: #eff6ff;
            transform: translateY(-2px);
        }

        input[type="radio"] {
            width: 20px;
            height: 20px;
            margin-right: 15px;
            cursor: pointer;
            accent-color: var(--primary-color);
        }

        .option-text {
            font-weight: 600;
            color: var(--text-main);
        }

        .confirmation-box {
            display: none;
            margin-top: 25px;
            padding: 20px;
            background: #ecfdf5;
            border-radius: 12px;
            border-left: 5px solid var(--success);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .confirmation-box p {
            margin: 0;
            color: #065f46;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        button {
            width: 100%;
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.2s;
        }

        button:hover {
            background: #1e3a8a;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Merci de sélectionner votre mandat.</h2>
    
    <form action="https://formsubmit.co/youssof.mazouz@gmail.com" method="POST">
        
        <div class="input-group">
            <label>Nom complet du client</label>
            <input type="text" name="Nom_Client" placeholder="Ex: Ahmed Benani" required>
        </div>

        <div class="input-group">
            <label>Numéro de téléphone</label>
            <input type="tel" name="Téléphone" placeholder="06XXXXXXXX" required>
        </div>

        <div class="options-label">Type de Mandat souhaité :</div>

        <div class="option-card" onclick="selectMandat('Mandat exclusive (3 mois) > 2% TTC', 'opt1')">
            <input type="radio" id="opt1" name="Type_Mandat" value="Exclusif 3 mois (2%)" required>
            <label for="opt1" class="option-text">Mandat exclusive (3 mois) > 2% TTC</label>
        </div>

        <div class="option-card" onclick="selectMandat('Mandat exclusive (6 mois) > 1.80% TTC', 'opt2')">
            <input type="radio" id="opt2" name="Type_Mandat" value="Exclusif 6 mois (1.80%)">
            <label for="opt2" class="option-text">Mandat exclusive (6 mois) > 1.80% TTC</label>
        </div>

        <div id="confirmBox" class="confirmation-box">
            <p id="selectedText"></p>
            <p><strong>Nous apprécions votre confiance.</strong></p>
        </div>

        <button type="submit">Valider et Envoyer</button>
    </form>
</div>

<script>
    function selectMandat(val, id) {
        document.getElementById(id).checked = true;
        const box = document.getElementById('confirmBox');
        const text = document.getElementById('selectedText');
        box.style.display = 'block';
        text.innerHTML = "Le mandat choisi est <b>" + val + "</b>.";
    }
</script>

</body>
</html>
