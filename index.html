<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mandat de Vente - Youssef Mazouz</title>
    <!-- استيراد خط Inter الاحترافي -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --yakeey-blue: #2563eb; /* اللون الأساسي لياكي */
            --yakeey-dark: #1e293b;
            --yakeey-black: #0f172a;
            --bg-light: #f8fafc;
            --white: #ffffff;
            --success: #10b981;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
            color: var(--yakeey-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: var(--white);
            width: 100%;
            max-width: 550px;
            padding: 50px;
            border-radius: 24px; /* زوايا دائرية ناعمة */
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.7);
        }

        h2 {
            font-size: 24px;
            font-weight: 800;
            line-height: 1.4;
            margin-bottom: 40px;
            color: var(--yakeey-black);
            text-align: center;
            position: relative;
        }

        /* خط تجميلي تحت العنوان */
        h2::after {
            content: '';
            display: block;
            width: 50px;
            height: 4px;
            background: var(--yakeey-blue);
            margin: 15px auto 0;
            border-radius: 2px;
        }

        .input-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-weight: 700;
            font-size: 13px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #64748b;
        }

        input[type="text"], input[type="tel"], input[type="number"] {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #f1f5f9;
            border-radius: 12px;
            font-size: 16px;
            background-color: #f8fafc;
            color: var(--yakeey-black);
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--yakeey-blue);
            background-color: var(--white);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        .options-container {
            margin-top: 30px;
        }

        .option-card {
            border: 2px solid #f1f5f9;
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            background: #ffffff;
        }

        .option-card:hover {
            border-color: var(--yakeey-blue);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
        }

        .option-card.selected {
            border-color: var(--yakeey-blue);
            background-color: rgba(37, 99, 235, 0.02);
        }

        input[type="radio"] {
            accent-color: var(--yakeey-blue);
            width: 22px;
            height: 22px;
            margin-right: 15px;
        }

        .option-text {
            font-size: 15px;
            font-weight: 600;
            color: var(--yakeey-dark);
        }

        .confirmation-box {
            display: none;
            margin-top: 30px;
            padding: 20px;
            border-radius: 12px;
            background-color: #ecfdf5;
            border: 1px solid #d1fae5;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        button {
            width: 100%;
            background-color: var(--yakeey-blue);
            color: var(--white);
            border: none;
            padding: 18px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 25px;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
            transition: all 0.3s ease;
        }

        button:hover {
            background-color: #1e40af;
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3);
        }

        .footer-brand {
            margin-top: 40px;
            text-align: center;
            font-size: 13px;
            font-weight: 600;
            color: #94a3b8;
        }

        /* لضمان المظهر الجيد على الموبايل */
        @media (max-width: 600px) {
            .container { padding: 30px 20px; }
            h2 { font-size: 20px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Merci de finaliser votre choix de mandat et le prix de vente souhaité</h2>
    
    <form action="https://formsubmit.co/youssof.mazouz@gmail.com" method="POST">
        <input type="hidden" name="_language" value="fr">
        <input type="hidden" name="_captcha" value="false">

        <div class="input-group">
            <label>Nom Complet du Client</label>
            <input type="text" name="Nom_Client" placeholder="Ex: SALMA NASSIMI" required>
        </div>

        <div class="input-group">
            <label>Téléphone</label>
            <input type="tel" name="Téléphone" placeholder="06XXXXXXXX" required>
        </div>

        <div class="input-group">
            <label>Prix de vente souhaité (MAD)</label>
            <input type="number" id="prixVente" name="Prix_Vente" placeholder="Ex: 1 500 000" oninput="updateSummary()" required>
        </div>

        <div class="options-container">
            <label>Sélection du Mandat</label>

            <div class="option-card" onclick="selectMandat('Mandat exclusive (3 mois) > 2% TTC', 'opt1')">
                <input type="radio" id="opt1" name="Type_Mandat" value="Exclusif 3 mois (2%)" required>
                <span class="option-text">Mandat exclusive (3 mois) > 2% TTC</span>
            </div>

            <div class="option-card" onclick="selectMandat('Mandat exclusive (6 mois) > 1.80% TTC', 'opt2')">
                <input type="radio" id="opt2" name="Type_Mandat" value="Exclusif 6 mois (1.80%)">
                <span class="option-text">Mandat exclusive (6 mois) > 1.80% TTC</span>
            </div>
        </div>

        <div id="confirmBox" class="confirmation-box">
            <p id="selectedText" style="margin:0 0 8px 0; font-weight:700; color: #065f46; font-size: 14px;"></p>
            <p id="priceText" style="margin:0 0 15px 0; font-weight:700; color: #065f46; font-size: 14px;"></p>
            <p style="margin:0; font-size:13px; line-height: 1.5; color: #065f46;"><strong>Merci pour votre confiance.</strong> Nous apprécions votre collaboration.</p>
        </div>

        <button type="submit">Confirmer ma sélection</button>
        <div class="footer-brand">YOUSSEF MAZOUZ • EXPERT IMMOBILIER</div>
    </form>
</div>

<script>
    let selectedMandatText = "";

    function selectMandat(val, id) {
        document.getElementById(id).checked = true;
        selectedMandatText = val;
        
        // تمييز الكرت المختار بصرياً
        document.querySelectorAll('.option-card').forEach(card => card.classList.remove('selected'));
        document.getElementById(id).parentElement.classList.add('selected');
        
        updateSummary();
    }

    function updateSummary() {
        const prix = document.getElementById('prixVente').value;
        const box = document.getElementById('confirmBox');
        const textMandat = document.getElementById('selectedText');
        const textPrice = document.getElementById('priceText');

        if (selectedMandatText) {
            box.style.display = 'block';
            textMandat.innerHTML = "Mandat choisi : " + selectedMandatText;
            if (prix) {
                textPrice.innerHTML = "Prix confirmé : " + Number(prix).toLocaleString() + " MAD";
            }
        }
    }
</script>

</body>
</html>
