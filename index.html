<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sélection de Mandat Immobilier</title>
    <style>
        :root {
            --primary-color: #1e40af;
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            --text-main: #0f172a;
            --success: #10b981;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 480px;
        }

        h2 {
            color: var(--primary-color);
            text-align: center;
            margin-bottom: 25px;
            font-size: 1.5rem;
        }

        .input-group { margin-bottom: 18px; }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #475569;
            font-size: 0.9rem;
        }

        input[type="text"], input[type="tel"], input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1rem;
            box-sizing: border-box;
        }

        .option-card {
            border: 2px solid #f1f5f9;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            background: #f8fafc;
        }

        .option-card:hover { border-color: #3b82f6; background: #eff6ff; }

        .confirmation-box {
            display: none;
            margin-top: 20px;
            padding: 15px;
            background: #ecfdf5;
            border-radius: 10px;
            border-left: 5px solid var(--success);
        }

        button {
            width: 100%;
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Détails du Mandat de Vente</h2>
    
    <form action="https://formsubmit.co/youssof.mazouz@gmail.com" method="POST">
        <input type="hidden" name="_language" value="fr">
        <input type="hidden" name="_captcha" value="false">

        <div class="input-group">
            <label>Nom complet du client</label>
            <input type="text" name="Nom_Client" placeholder="Ex: Madame Hayat" required>
        </div>

        <div class="input-group">
            <label>Numéro de téléphone</label>
            <input type="tel" name="Téléphone" placeholder="06XXXXXXXX" required>
        </div>

        <div class="input-group">
            <label>Prix de vente souhaité (MAD)</label>
            <input type="number" id="prixVente" name="Prix_Vente" placeholder="Ex: 1500000" oninput="updateSummary()" required>
        </div>

        <label>Type de Mandat souhaité :</label>

        <div class="option-card" onclick="selectMandat('Mandat exclusive (3 mois) > 2% TTC', 'opt1')">
            <input type="radio" id="opt1" name="Type_Mandat" value="Exclusif 3 mois (2%)" required>
            <label for="opt1" style="cursor:pointer; margin-left:10px;">Mandat exclusive (3 mois) > 2% TTC</label>
        </div>

        <div class="option-card" onclick="selectMandat('Mandat exclusive (6 mois) > 1.80% TTC', 'opt2')">
            <input type="radio" id="opt2" name="Type_Mandat" value="Exclusif 6 mois (1.80%)">
            <label for="opt2" style="cursor:pointer; margin-left:10px;">Mandat exclusive (6 mois) > 1.80% TTC</label>
        </div>

        <div id="confirmBox" class="confirmation-box">
            <p id="selectedText" style="margin:0; color:#065f46;"></p>
            <p id="priceText" style="margin:5px 0 0; color:#065f46;"></p>
            <p style="margin-top:10px; color:#065f46;"><strong>Merci pour votre confiance. Nous apprécions votre collaboration.</strong></p>
        </div>

        <button type="submit">Confirmer et Envoyer</button>
    </form>
</div>

<script>
    let selectedMandatText = "";

    function selectMandat(val, id) {
        document.getElementById(id).checked = true;
        selectedMandatText = val;
        updateSummary();
    }

    function updateSummary() {
        const prix = document.getElementById('prixVente').value;
        const box = document.getElementById('confirmBox');
        const textMandat = document.getElementById('selectedText');
        const textPrice = document.getElementById('priceText');

        if (selectedMandatText) {
            box.style.display = 'block';
            textMandat.innerHTML = "Mandat choisi : <b>" + selectedMandatText + "</b>";
            if (prix) {
                textPrice.innerHTML = "Prix de vente : <b>" + Number(prix).toLocaleString() + " MAD</b>";
            }
        }
    }
</script>

</body>
</html>
